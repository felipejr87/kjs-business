<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anúncio — KJS Business</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* NAV simples */
    .nav {
      height: 56px; display: flex; align-items: center;
      padding: 0 24px; border-bottom: 1px solid var(--sep);
      position: sticky; top: 0; background: rgba(10,10,10,.9);
      backdrop-filter: blur(16px); z-index: 50;
    }
    .nav a {
      color: var(--text-2); text-decoration: none;
      font-family: var(--font-brand); font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .nav a:hover { color: var(--text); }

    /* CONTEÚDO */
    #conteudo { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* GALERIA */
    .galeria { margin-bottom: 32px; }
    .galeria-principal {
      position: relative;
      height: 420px; border-radius: var(--r-xl);
      overflow: hidden; background: var(--bg-card-2);
    }
    #foto-main { width: 100%; height: 100%; object-fit: cover; }
    .galeria-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.6); border: none; border-radius: 50%;
      width: 44px; height: 44px; color: white; font-size: 24px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); transition: background .2s;
    }
    .galeria-nav:hover { background: rgba(0,0,0,.85); }
    .galeria-nav.prev { left: 12px; }
    .galeria-nav.next { right: 12px; }
    .galeria-counter {
      position: absolute; bottom: 12px; right: 12px;
      background: rgba(0,0,0,.65); color: white;
      border-radius: 99px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; font-family: var(--font-brand);
      backdrop-filter: blur(4px);
    }
    .galeria-thumbs {
      display: flex; gap: 8px; margin-top: 10px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .thumb {
      flex: 0 0 72px; height: 54px;
      border-radius: var(--r-sm); overflow: hidden;
      cursor: pointer; border: 2px solid transparent;
      opacity: .6; transition: all .2s;
    }
    .thumb.ativo { border-color: var(--primary); opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* BODY DO ANÚNCIO */
    .anuncio-body {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
    }
    .anuncio-badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .anuncio-titulo {
      font-family: var(--font-brand);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    .anuncio-preco {
      font-family: var(--font-brand);
      font-size: 32px; font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
    }

    /* SPECS GRID */
    .specs-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--sep);
      border: 1px solid var(--sep);
      border-radius: var(--r-lg);
      overflow: hidden;
      margin-bottom: 28px;
    }
    .spec-item {
      background: var(--bg-card);
      padding: 14px 16px;
    }
    .spec-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; margin-bottom: 4px; }
    .spec-valor { font-family: var(--font-brand); font-size: 14px; font-weight: 600; }

    /* DESCRIÇÃO */
    .anuncio-descricao { margin-bottom: 28px; }
    .anuncio-descricao h3 { font-family: var(--font-brand); font-size: 14px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .anuncio-descricao p { color: var(--text-2); line-height: 1.8; font-size: 15px; }

    /* PAGAMENTO SECTION */
    .pgto-section h3 { font-family: var(--font-brand); font-size: 14px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0; }

    /* SIDEBAR */
    .anuncio-sidebar { }
    .sidebar-card {
      position: sticky; top: 72px;
      background: var(--bg-card);
      border: 1px solid var(--sep);
      border-radius: var(--r-xl);
      padding: 24px;
    }
    .sidebar-preco {
      font-family: var(--font-brand);
      font-size: 28px; font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .sidebar-desc { color: var(--text-2); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
    .btn-wpp-grande {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: #25D366; color: white; border: none;
      border-radius: var(--r-md);
      font-family: var(--font-brand); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; margin-bottom: 10px;
    }
    .btn-wpp-grande:hover { background: #1FB855; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(37,211,102,.3); }
    .btn-compartilhar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px;
      background: transparent; color: var(--text-2);
      border: 1px solid var(--sep-strong);
      border-radius: var(--r-md);
      font-family: var(--font-brand); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s; margin-bottom: 10px;
    }
    .btn-compartilhar:hover { border-color: var(--text-3); color: var(--text); }
    .btn-instagram {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px;
      background: transparent; color: var(--text-2);
      border: 1px solid var(--sep-strong);
      border-radius: var(--r-md);
      font-family: var(--font-brand); font-size: 13px; font-weight: 600;
      text-decoration: none; transition: all .2s;
    }
    .btn-instagram:hover { border-color: var(--text-3); color: var(--text); }
    .btn-voltar {
      display: block; text-align: center; margin-top: 16px;
      color: var(--text-3); font-size: 13px; text-decoration: none;
    }
    .btn-voltar:hover { color: var(--text-2); }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 80px 24px; color: var(--text-2); }
    .not-found h2 { font-family: var(--font-brand); font-size: 24px; margin: 16px 0 8px; }

    @media (max-width: 768px) {
      .galeria-principal { height: 260px; }
      .anuncio-body { grid-template-columns: 1fr; }
      .sidebar-card { position: static; }
      .anuncio-preco { font-size: 26px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar aos anúncios
    </a>
  </nav>

  <div id="conteudo">
    <!-- Skeleton enquanto carrega -->
    <div class="galeria">
      <div class="skeleton" style="height:420px;border-radius:16px"></div>
    </div>
    <div class="anuncio-body">
      <div>
        <div class="skeleton" style="height:16px;width:80px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:36px;width:70%;margin-bottom:12px"></div>
        <div class="skeleton" style="height:32px;width:40%;margin-bottom:24px"></div>
        <div class="specs-grid">
          ${Array(6).fill('<div class="spec-item"><div class="skeleton sk-specs"></div></div>').join('')}
        </div>
      </div>
      <div>
        <div class="skeleton" style="height:240px;border-radius:16px"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/core.js"></script>
  <script src="/js/anuncio.js"></script>
</body>
</html>
